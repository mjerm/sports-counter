<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="total">
      <div class="container">
        <div>
          <h3>HOME</h3>
          <p id="counter-home" class="special-text">0</p>
          <button onclick="incrementHomeOne()" class="special-text">+1</button>
          <button onclick="incrementHomeTwo()" class="special-text">+2</button>
          <button onclick="incrementHomeThree()" class="special-text">
            +3
          </button>
        </div>
        <div>
          <h3>GUEST</h3>
          <p id="counter-guest" class="special-text">0</p>
          <button onclick="incrementGuestOne()" class="special-text">+1</button>
          <button onclick="incrementGuestTwo()" class="special-text">+2</button>
          <button onclick="incrementGuestThree()" class="special-text">
            +3
          </button>
        </div>
      </div>
      <div class="new-game">
        <button onclick="newGame()" class="special-text">New Game</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
